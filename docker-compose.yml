# =============================================================================
# RadioManager API — Docker Compose (Dokploy)
# =============================================================================
#
# Deploiement via Dokploy : ce fichier est lu automatiquement par Dokploy.
# Les variables d'environnement sont definies dans l'interface Dokploy
# (Settings > Environment).
#
# VARIABLES OBLIGATOIRES (sans default, le deploiement echoue si absentes) :
#   POSTGRES_PASSWORD        Mot de passe PostgreSQL
#   SECRET_KEY               Cle secrete JWT (longue chaine aleatoire)
#   ADMIN_PASSWORD           Mot de passe du compte admin cree au demarrage
#   TOTP_ENCRYPTION_KEY      Cle Fernet pour chiffrement 2FA
#                            Generer : python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#
# VARIABLES RECOMMANDEES :
#   GOOGLE_CLIENT_ID         OAuth Google Drive (backups)
#   GOOGLE_CLIENT_SECRET     OAuth Google Drive (backups)
#   GA_SERVICE_ACCOUNT_JSON  Contenu JSON du Service Account GA4 (coller le JSON complet)
#   FRONTEND_URL             https://app.cloud.audace.ovh (default)
#   BACKEND_URL              https://api.cloud.audace.ovh (default)
#
# COMMANDES UTILES (sur le serveur) :
#   docker logs audace_api --tail 50 -f          Logs API en temps reel
#   docker logs audace_db --tail 50 -f           Logs PostgreSQL
#   docker exec audace_db pg_dump -U audace_user audace_db | gzip > backup.sql.gz
#   docker exec -it audace_api alembic current   Version Alembic actuelle
#   docker compose run --rm migrate              Lancer les migrations manuellement
#
# VOLUMES :
#   postgres_data   Donnees PostgreSQL (persistant)
#   backups_data    Sauvegardes SQL (partage entre db et api)
#
# =============================================================================

version: '3.8'

services:
  # Base de données PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: audace_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-audace_db}
      POSTGRES_USER: ${POSTGRES_USER:-audace_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - backups_data:/backups  # Volume partage pour les sauvegardes (db + api)
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - audace_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-audace_user} -d ${POSTGRES_DB:-audace_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API FastAPI
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audace_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    labels:
      # Désactiver les labels auto-générés par Dokploy
      - "com.centurylinklabs.watchtower.enable=false"
      
      # Configuration Traefik explicite
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      
      # Router HTTP → HTTPS redirect
      - "traefik.http.routers.audace-api-http.rule=Host(`api.cloud.audace.ovh`)"
      - "traefik.http.routers.audace-api-http.entrypoints=web"
      - "traefik.http.routers.audace-api-http.middlewares=https-redirect"
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"
      
      # Router HTTPS (websecure)
      - "traefik.http.routers.audace-api-prod.rule=Host(`api.cloud.audace.ovh`)"
      - "traefik.http.routers.audace-api-prod.entrypoints=websecure"
      - "traefik.http.routers.audace-api-prod.tls=true"
      - "traefik.http.routers.audace-api-prod.tls.certresolver=letsencrypt"
      
      # Service explicite (évite l'auto-linking)
      - "traefik.http.routers.audace-api-prod.service=audace-api-service"
      - "traefik.http.services.audace-api-service.loadbalancer.server.port=8000"
      
      # Middlewares de sécurité
      - "traefik.http.routers.audace-api-prod.middlewares=api-cors,api-security,api-compress"
      - "traefik.http.middlewares.api-compress.compress=true"
      
      # CORS — middleware dédié (s'applique avant tout, y compris sur les erreurs)
      # ⚠️ IMPORTANT: Cette config Traefik ECRASE le CORS de FastAPI (maintest.py).
      # Tout nouveau header custom doit être ajouté ICI dans accessControlAllowHeaders.
      - "traefik.http.middlewares.api-cors.headers.accessControlAllowOriginList=https://app.cloud.audace.ovh,https://app.radio.audace.ovh"
      - "traefik.http.middlewares.api-cors.headers.accessControlAllowMethods=GET,POST,PUT,PATCH,DELETE,OPTIONS"
      - "traefik.http.middlewares.api-cors.headers.accessControlAllowHeaders=Authorization,Content-Type,Accept,Origin,X-Requested-With,X-Trusted-Device,X-Remember-Device"
      - "traefik.http.middlewares.api-cors.headers.accessControlAllowCredentials=true"
      - "traefik.http.middlewares.api-cors.headers.accessControlExposeHeaders=X-Total-Count"
      - "traefik.http.middlewares.api-cors.headers.accessControlMaxAge=3600"
      - "traefik.http.middlewares.api-cors.headers.addVaryHeader=true"
      
      # Headers de sécurité (séparé du CORS)
      - "traefik.http.middlewares.api-security.headers.sslredirect=true"
      - "traefik.http.middlewares.api-security.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.api-security.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.api-security.headers.stsPreload=true"
      - "traefik.http.middlewares.api-security.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.api-security.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.api-security.headers.browserXssFilter=true"
      - "traefik.http.middlewares.api-security.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.api-security.headers.customFrameOptionsValue=SAMEORIGIN"
    environment:
      # Variables pour le code FastAPI (config.py)
      DATABASE_HOSTNAME: db
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${POSTGRES_USER:-audace_user}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB:-audace_db}
      
      # JWT & Security
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRATION_MINUTE: ${ACCESS_TOKEN_EXPIRATION_MINUTE:-30}
      # ⚠️ OBLIGATOIRE pour 2FA: Generer via python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY}
      
      # Email (si utilisé pour reset password)
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_SERVER: ${MAIL_SERVER}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Audace API}
      MAIL_TLS: ${MAIL_TLS:-true}
      MAIL_SSL: ${MAIL_SSL:-false}
      
      # Application
      FRONTEND_URL: ${FRONTEND_URL:-https://app.cloud.audace.ovh}
      BACKEND_URL: ${BACKEND_URL:-https://api.cloud.audace.ovh}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      
      # Admin par défaut (créé automatiquement au démarrage)
      # ⚠️ OBLIGATOIRE: Définir ADMIN_PASSWORD dans .env (pas de default pour raison de sécurité)
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin@radiomanager.ovh}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@radiomanager.ovh}
      ADMIN_NAME: ${ADMIN_NAME:-Administrateur}
      ADMIN_FAMILY_NAME: ${ADMIN_FAMILY_NAME:-Système}

      # OVH API (consultation des services)
      OVH_ENDPOINT: ${OVH_ENDPOINT:-ovh-eu}
      OVH_APPLICATION_KEY: ${OVH_APPLICATION_KEY:-}
      OVH_APPLICATION_SECRET: ${OVH_APPLICATION_SECRET:-}
      OVH_CONSUMER_KEY: ${OVH_CONSUMER_KEY:-}

      # Scaleway Dedibox API (api.online.net)
      SCW_SECRET_KEY: ${SCW_SECRET_KEY:-}

      # Facebook / Instagram OAuth (Meta App)
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      FACEBOOK_CONFIG_ID: ${FACEBOOK_CONFIG_ID:-}

      # LinkedIn OAuth
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}

      # Twitter/X OAuth 2.0
      TWITTER_CLIENT_ID: ${TWITTER_CLIENT_ID:-}
      TWITTER_CLIENT_SECRET: ${TWITTER_CLIENT_SECRET:-}

      # RadioDJ integration (Now Playing)
      RADIODJ_API_KEY: ${RADIODJ_API_KEY:-}

      # Mistral AI (generation de posts depuis URL)
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}

      # Cloudflare Worker — extraction sous-titres YouTube (legacy)
      YOUTUBE_WORKER_URL: ${YOUTUBE_WORKER_URL:-}
      YOUTUBE_WORKER_SECRET: ${YOUTUBE_WORKER_SECRET:-}

      # yt-dlp : proxy residentiel pour contourner le blocage IP YouTube
      # Format : http://user:pass@host:port
      YTDLP_PROXY: ${YTDLP_PROXY:-}
      # yt-dlp : chemin cookies YouTube (JSON Chrome ou Netscape, auto-converti)
      YTDLP_COOKIES_PATH: ${YTDLP_COOKIES_PATH:-/app/data/cookies.txt}

      # Firebase Storage (nettoyage fichiers temporaires apres publication)
      # Accepte : JSON direct, chemin fichier, ou JSON encode en base64
      FIREBASE_SERVICE_ACCOUNT: ${FIREBASE_SERVICE_ACCOUNT:-}

      # WordPress Articles (proxy vers wp-json/wp/v2)
      WP_AUDACEMAGAZINE_URL: ${WP_AUDACEMAGAZINE_URL:-https://www.audacemagazine.com}
      WP_AUDACEMAGAZINE_USER: ${WP_AUDACEMAGAZINE_USER:-}
      WP_AUDACEMAGAZINE_APP_PASSWORD: ${WP_AUDACEMAGAZINE_APP_PASSWORD:-}
      WP_RADIOAUDACE_URL: ${WP_RADIOAUDACE_URL:-https://www.radioaudace.com}
      WP_RADIOAUDACE_USER: ${WP_RADIOAUDACE_USER:-}
      WP_RADIOAUDACE_APP_PASSWORD: ${WP_RADIOAUDACE_APP_PASSWORD:-}

      # Google OAuth (Backup Management — Google Drive)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

      # Google Analytics 4 — Contenu JSON du Service Account
      GA_SERVICE_ACCOUNT_JSON: ${GA_SERVICE_ACCOUNT_JSON:-}

      # Uvicorn/Gunicorn
      HOST: 0.0.0.0
      PORT: 8000
      WORKERS: ${WORKERS:-4}
    expose:
      - "8000"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data        # Cookies YouTube (persistant entre redeploys)
      - backups_data:/backups
    networks:
      - audace_network
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/version/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # L'entrypoint.sh gere : attente DB + migrations Alembic + demarrage gunicorn

  # Service pour exécuter les migrations manuellement
  # Usage: docker-compose run --rm migrate
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_HOSTNAME: db
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${POSTGRES_USER:-audace_user}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB:-audace_db}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRATION_MINUTE: ${ACCESS_TOKEN_EXPIRATION_MINUTE:-30}
    networks:
      - audace_network
    command: alembic upgrade head
    profiles:
      - tools  # Ne démarre pas automatiquement avec docker-compose up

networks:
  audace_network:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  postgres_data:
    driver: local
  backups_data:
    driver: local